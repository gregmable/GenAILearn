<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="300" height="225" role="img" aria-label="Pega Infinity logo">
  <defs>
    <style>
      .pega-brand-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 700; }
      .pega-main { font-size: 36px; fill: #001f5b; }
      .pega-sub { font-size: 14px; fill: #001f5b; letter-spacing: 0.5px; }
    </style>
  </defs>
  
  <!-- Left Teal Diamond -->
  <g transform="translate(85, 85)">
    <rect x="-60" y="-60" width="120" height="120" fill="#20B2AA" transform="rotate(45)" />
  </g>
  
  <!-- Right Yellow Diamond -->
  <g transform="translate(245, 85)">
    <rect x="-60" y="-60" width="120" height="120" fill="#FFE135" transform="rotate(45)" />
  </g>
  
  <!-- Center Navy Diamond with PEGA text -->
  <g transform="translate(165, 85)">
    <rect x="-50" y="-50" width="100" height="100" fill="#001f5b" transform="rotate(45)" />
    <text x="0" y="12" text-anchor="middle" class="pega-brand-text pega-main" fill="#ffffff">PEGA</text>
  </g>
  
  <!-- Main text: Pega Infinity -->
  <text x="200" y="200" text-anchor="middle" class="pega-brand-text pega-main">Pega Infinity</text>
  <!-- Trademark -->
  <text x="340" y="190" class="pega-brand-text pega-sub">™</text>
</svg>
